version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dental_admin
      - POSTGRES_PASSWORD=dental_pass
      - POSTGRES_DB=dental_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_admin -d dental_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://dental_admin:dental_pass@db:5432/dental_rag
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Seed on startup (idempotent — exits early if data already present),
    # then start the API.
    command: >
      sh -c "python -m src.db.seed && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "frontend/app.py", "--server.address=0.0.0.0", "--server.port=8501"]

volumes:
  pgdata:
