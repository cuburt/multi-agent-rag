version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dental_admin
      - POSTGRES_PASSWORD=dental_pass
      - POSTGRES_DB=dental_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_admin -d dental_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
