name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (no LLM keys required)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dental_admin
          POSTGRES_PASSWORD: dental_pass
          POSTGRES_DB: dental_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dental_admin -d dental_rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://dental_admin:dental_pass@localhost:5432/dental_rag
      # No LLM keys here on purpose — unit tests must not depend on a network
      # round-trip. Anything that needs the LLM lives in the integration job.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  integration-redteam:
    name: Red-team pack (requires LLM secrets)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run when the LLM provider secret is configured on the repo.
    # On forks/PRs without secrets this job is skipped instead of failing —
    # the unit-tests gate still runs and blocks merge on its own.
    if: ${{ github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository) }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dental_admin
          POSTGRES_PASSWORD: dental_pass
          POSTGRES_DB: dental_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dental_admin -d dental_rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://dental_admin:dental_pass@localhost:5432/dental_rag
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VERCEL_API_KEY: ${{ secrets.VERCEL_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: https://cloud.langfuse.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Skip if no LLM secrets configured
        id: gate
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::OPENROUTER_API_KEY not set — skipping red-team integration."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed DB
        if: steps.gate.outputs.skip != 'true'
        run: python -m src.db.seed

      - name: Start API in background
        if: steps.gate.outputs.skip != 'true'
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          echo $! > .api.pid
          for i in {1..30}; do
            curl -fsS http://localhost:8000/openapi.json > /dev/null && break
            sleep 1
          done

      - name: Run red-team pack
        if: steps.gate.outputs.skip != 'true'
        run: python -m evals.red_team

      - name: Stop API
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          if [ -f .api.pid ]; then kill "$(cat .api.pid)" || true; fi
